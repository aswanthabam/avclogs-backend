version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: avcledger_mongo
    ports:
      - "27017:27017"
    volumes:
      - avcledger_mongo_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avcledger_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  avcledger_mongo_data:
